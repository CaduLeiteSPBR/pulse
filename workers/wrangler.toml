name = "pulse-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
APP_URL = "https://pulse.inovacx.com"
SESSION_SECRET = ""

[[d1_databases]]
binding = "DB"
database_name = "pulse-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
